name: main workflow
on:
  pull_request:
    types:
      - opened
      - synchronize

# complete job name should be: "hello / pipeline"
jobs:
  hello-temp:
    runs-on: ubuntu-latest
    steps:
      - name: "hello / pipeline"
        run: |
          echo "temporary job with name change"
  hello:
    uses: ./.github/workflows/reusable.yml
    with:
      target-runner-labels: "['ubuntu-latest']"
      config-path: new/hello/pipeline.yml

  gcc:
    uses: ./.github/workflows/reusable.yml
    with:
      target-runner-labels: "['ubuntu-latest']"
      config-path: smiley/face/hehe.yml

  cuda:
    name: cuda-uvm
    uses: ./.github/workflows/reusable.yml
    with:
      target-runner-labels: "['ubuntu-latest']"
      config-path: some/cuda/gpu.yml

